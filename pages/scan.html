<section class="scan">

<div class="scan-status">

<div id="cameraStatus" class="camera-status">
📷 Preparing Camera...
</div>

<button
id="torchBtn"
class="torch-btn hidden">
🔦
</button>

</div>

<div class="scanner-box">

<div id="reader"></div>

<div class="scan-line"></div>

<div id="loadingMask" class="loading-mask">

<div class="loading-spinner"></div>

<div class="loading-text">
Opening Camera...
</div>

</div>

<div
id="scanResult"
class="scan-result hidden">

<div
id="resultIcon"
class="result-icon">
✅
</div>

<div
id="resultTitle"
class="result-title">
Ready
</div>

<div
id="resultMessage"
class="result-message">
Waiting for QR Code
</div>

<div
id="resultExtra"
class="result-extra">
</div>

</div>

</div>

<div class="scan-footer">

<div class="scan-tip">
Point the camera at a QR Code
</div>

<div
id="scanInfo"
class="scan-info">

Ready

</div>

</div>

</section>
