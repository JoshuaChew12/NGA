<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
NGA Worship Check-in
</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

<!-- =====================
APP HEADER
===================== -->
<header id="appHeader">

<div class="app-title">
🔥 NGA Worship
</div>

<div id="counterBox">

<span id="checkCount">
0
</span>

<span>
Checked In
</span>

</div>

</header>

<!-- =====================
PAGES
===================== -->
<main id="pages">

<!-- =====================
HOME
===================== -->
<section
id="homePage"
class="page active">

<!-- CLOCK HERO -->

<div class="clock-card">

<div id="clock"
class="clock">

00:00:00

</div>

<div id="todayDay"
class="clock-day">
----
</div>

<div id="todayDate"
class="clock-date">
----
</div>

</div>

<!-- DASHBOARD -->
<div
id="dashboard"
class="dashboard hidden">

</div>

<!-- LOGOUT -->

<button
class="logout-btn">

Logout

</button>

</section>

<!-- =====================
MANUAL
===================== -->
<section
id="manualPage"
class="page">

<div class="counter-small">

Checked In:
<span>
0
</span>

</div>

<h2>
Manual Check-in
</h2>

<div class="card"
id="manualContent">

<input
id="manualInput"
placeholder="Enter Member ID">

<button>
Submit
</button>

</div>

</section>

<!-- =====================
SCAN
===================== -->
<section
id="scanPage"
class="page">

<div class="counter-small">

Checked In:
<span>
0
</span>

</div>

<h2>
Scan QR
</h2>

<div class="card">

<div id="scanner">

</div>

<div
id="scanResult">

</div>

</div>

</section>

<!-- =====================
SEARCH
===================== -->
<section
id="searchPage"
class="page">

<h2>
Search Member
</h2>

<div class="card">

<input
id="searchInput"
placeholder="Name / ID">

<button>
Search
</button>

<div
id="searchResult">

</div>

</div>

</section>

<!-- =====================
REGISTER
===================== -->
<section
id="registerPage"
class="page">

<h2>
New Registration
</h2>

<div class="card">

<input
placeholder="Chinese Name">

<input
placeholder="English Name">

<input
placeholder="Phone">

<button>
Register
</button>

<div
id="registerResult">

</div>

</div>

</section>

</main>

<!-- =====================
BOTTOM NAVIGATION
===================== -->
<nav id="bottomNav">

<button
data-page="homePage">

🏠
<span>
Home
</span>

</button>

<button
data-page="manualPage">

⌨️
<span>
Manual
</span>

</button>

<button
id="scanNav">

<div class="scan-circle">

📷

</div>

<span>
Scan
</span>

</button>

<button
data-page="searchPage">

🔍
<span>
Search
</span>

</button>

<button
data-page="registerPage">

📝
<span>
Register
</span>

</button>


</nav>

<!-- =====================
SCRIPTS
===================== -->
<script src="api.js"></script>
<script src="home.js"></script>
<script src="scan.js"></script>
<script src="search.js"></script>
<script src="register.js"></script>
<script src="app.js"></script>

</body>

</html>
