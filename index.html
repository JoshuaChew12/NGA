<!DOCTYPE html>
<html>
<head>

<link rel="preconnect" href="https://script.gstatic.com">
<link rel="dns-prefetch" href="https://script.google.com">
<link rel="dns-prefetch" href="https://script.gstatic.com">

<!-- Firebase -->

<style>
/* 全局基础重置：硬核数码纯黑 */
body {
  margin: 0;
  padding: 0;
  /* 换成更具现代工业感的无衬线或等宽字体 */
  font-family: system-ui, -apple-system, "SF Pro Text", monospace, Arial;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #000000; /* 纯黑背景，完美适配手机 OLED 屏幕的极致深邃 */
  color: #ffffff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 核心背景：精密坐标十字网格线（纯 CSS 绘制，极具专业仪表盘质感） */
.industrial-grid {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  background-image: 
    linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
  background-size: 30px 30px; /* 大跨度的物理网格 */
  z-index: -1;
}

/* 极简等宽输入框：像精密仪器一样的输入槽 */
input {
  padding: 16px;
  font-size: 16px;
  width: 240px;
  background: #0f0f0f;
  border: 1px solid #222222; /* 低反差深灰边框 */
  border-radius: 4px; /* 硬朗的极小圆角，工业感的核心 */
  color: #ffffff;
  font-family: monospace;
  text-align: center;
  outline: none;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
  transition: all 0.2s ease;
}
input:focus {
  border-color: #ffffff; /* 聚焦时边框变纯白 */
  background: #151515;
}
input::placeholder {
  color: #444444;
}

/* 模块化纯黑实色大按钮 */
button {
  padding: 14px 28px;
  margin: 10px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 4px;
  background: #ffffff; /* 纯白按钮 */
  color: #000000; /* 纯黑文字 */
  border: none;
  box-shadow: 0 4px 12px rgba(255,255,255,0.1);
  transition: all 0.15s ease;
  cursor: pointer;
  letter-spacing: 1px;
}
button:active {
  transform: scale(0.96);
  background: #cccccc;
}

/* 主页菜单网格 */
#home > div {
  gap: 16px !important; /* 加大卡片间距，制造呼吸感 */
  padding: 10px;
}

/* 主页菜单卡片：重构为“低反差物理实体舱” */
.homeCard {
  height: 110px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  box-sizing: border-box;
  background: #0a0a0a; /* 极深的暗灰，与纯黑背景拉开极弱的层级 */
  border: 1px solid #1a1a1a; /* 细腻的暗色线条 */
  border-radius: 8px; /* 硬朗微圆角 */
  /* 物理触手感：使用大范围的极淡环境阴影 */
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  cursor: pointer;
  width: 100%;
  color: #888888; /* 默认灰色，保持低调 */
}

/* 卡片按下时的极致物理反馈（Squeeze 挤压特效） */
.homeCard:active {
  transform: scale(0.95);
  background: #ffffff; /* 按下时瞬间反转成纯白卡片 */
  border-color: #ffffff;
  color: #000000; /* 文字变黑 */
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
}

/* 按下时让卡片内部的 Emoji 图标也协同变色 */
.homeCard:active .homeIcon,
.homeCard:active .homeText {
  color: #000000 !important;
}

.homeIcon {
  font-size: 26px;
  margin-bottom: 8px;
  line-height: 1;
  color: #ffffff; /* 单色化，去除杂色 */
}

.homeText {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.3;
  color: #eeeeee;
  letter-spacing: 0.5px;
}

/* 工业状态指示灯 */
.success {
  background: #000000 !important;
  border: 1px solid #00ff66 !important; /* 纯工业绿线 */
  color: #00ff66 !important;
}
.duplicate {
  background: #000000 !important;
  border: 1px solid #ffcc00 !important; /* 工业黄线 */
  color: #ffcc00 !important;
}
.error {
  background: #000000 !important;
  border: 1px solid #ff3333 !important; /* 工业红线 */
  color: #ff3333 !important;
}

/* 登录面板卡片 */
.loginBox {
  margin-top: 40px;
  background: #050505;
  padding: 35px 25px;
  border-radius: 8px;
  border: 1px solid #111111;
  box-shadow: 0 30px 60px rgba(0,0,0,0.8);
}

/* 应用主容器 */
#appContainer {
  width: 100%;
  max-width: 520px;
  padding: 24px;
  box-sizing: border-box;
  position: relative;
  z-index: 1;
}

/* 看板数字：变成冷光白 */
#count, #d_total, #d_checked, #d_pending, #d_a, #d_b {
  color: #ffffff;
  font-weight: 700;
  font-family: monospace;
}

/* 文字排版：纯白色彩控制 */
h2 {
  font-size: 26px !important;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 0.5px;
  margin-bottom: 6px !important;
}
h3 {
  font-size: 18px !important;
  color: #888888; /* 辅助文字用中灰 */
  font-weight: 500;
  margin-top: 0;
}
h4 {
  font-size: 13px !important;
  color: #444444 !important; /* 英文用暗灰 */
  font-weight: 500;
  letter-spacing: 2px;
}
h5 {
  color: #ffffff;
  font-size: 14px !important;
  font-family: monospace;
  border: 1px dashed #333333; /* 虚线框，极具图纸感 */
  padding: 6px 14px;
  display: inline-block;
}
</style>

</head>

<script>

// =====================================
// CONFIG
// =====================================

const API_URL =
"https://script.google.com/macros/s/AKfycbx0J4r_E2dRfHPV7TyJNf4-h-MJzSkfRB4f2aeFi1fRgO-Osw4ekVAADVAL4qWluI4h/exec";

// =====================================
// FIREBASE
// =====================================

firebase.initializeApp({

  databaseURL:
  "https://nga-worship-default-rtdb.asia-southeast1.firebasedatabase.app/"

});

const db = firebase.database();

// realtime counter

db.ref("count").on("value", snap => {

  document.getElementById("count")
    .innerText = snap.val() || 0;

});

// =====================================
// GLOBALS
// =====================================

let scanner = null;
let scannerStarted = false;
let currentMode = "";
let scanCooldown = false;
let idleTimer = null;

const DEFAULT_IDLE_LIMIT = 10 * 60 * 1000;
const WARMUP_KEY = "gas_warmup_last";
const WARMUP_COOLDOWN = 4 * 60 * 1000;

// =====================================
// PRELOAD BEEP
// =====================================

const beep = new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

beep.preload = "auto";

// =====================================
// APP START
// =====================================

window.addEventListener("load", () => {

  // initial warm
  smartWarmup("full");

  // keep warm
  setInterval(() => {

    smartWarmup("smart");

  }, 4 * 60 * 1000);
  
  ["click","touchstart","keypress"].forEach(event => {

  document.addEventListener(event, () => {

    if (
      sessionStorage.getItem("auth") === "true"
    ) {
      resetIdleTimer();
    }

  });

});
  
  // =====================================
  // LOGIN CHECK
  // =====================================

  const auth =
    sessionStorage.getItem("auth");

  if (auth === "true") {

    startSessionMonitor();

    showApp();

  } else {

    showLoginPage();

  }

});

// =====================================
// LOGIN
// =====================================

function login() {

  smartWarmup("login_fallback");
  
  const username =
    document.getElementById("username")
      .value
      .trim();

  const password =
    document.getElementById("password")
      .value
      .trim();

  // =====================================
  // EMPTY CHECK
  // =====================================

  if (!username || !password) {

    document.getElementById("loginError")
      .innerText =
      "Enter username and password";

    return;

  }

  // =====================================
  // LOADING
  // =====================================

  showLoginLoading();

  // =====================================
  // TIMEOUT PROTECTION
  // =====================================

  const controller =
    new AbortController();

  const timeout =
    setTimeout(() => {

      controller.abort();

    }, 20000);

  // =====================================
  // LOGIN REQUEST
  // =====================================

  fetch(

    API_URL +

    "?action=login" +

    "&username=" +
    encodeURIComponent(username) +

    "&password=" +
    encodeURIComponent(password),

    {

      signal: controller.signal,

      cache: "no-store",

      keepalive: true

    }

  )

  .then(r => r.json())

  .then(data => {

    // =====================================
    // SUCCESS
    // =====================================

    if (data.success) {

      sessionStorage.setItem(
        "auth",
        "true"
      );

      sessionStorage.setItem(
        "username",
        data.username
      );

      sessionStorage.setItem(
        "role",
        data.role
      );

      // =====================================
      // SAVE SESSION TOKEN
      // =====================================

      sessionStorage.setItem(
        "sessionToken",
        data.token
      );

      sessionStorage.setItem(
        "idleLimit",
        data.idleLimit
      );
      
      resetIdleTimer();

      // start session monitor
      startSessionMonitor();

      showApp();

      return;

    }

    // =====================================
    // INVALID LOGIN
    // =====================================

    document.getElementById("loginError")
      .innerText =
      "Invalid username or password";

    showLoginPage();

  })

  // =====================================
  // NETWORK ERROR / TIMEOUT
  // =====================================

  .catch(err => {

    // timeout
    if (err.name === "AbortError") {

      document.getElementById("loginError")
        .innerText =
        "Login timeout";

      showLoginPage();

      return;

    }

    // other network errors
    document.getElementById("loginError")
      .innerText =
      "Network error";

    showLoginPage();

  })

  // =====================================
  // CLEAR TIMER
  // =====================================

  .finally(() => {

    clearTimeout(timeout);

  });

}

// =====================================
// LOGOUT
// =====================================

function logout() {

  // stop monitor
  if (sessionMonitor) {

    clearInterval(
      sessionMonitor
    );

    sessionMonitor = null;

  }

  sessionStorage.clear();

  goHome();

  hideAll();

  showLoginPage();

}

let sessionMonitor = null;

function startSessionMonitor() {

  // avoid duplicate interval
  if (sessionMonitor) {
    return;
  }

  sessionMonitor = setInterval(async () => {

    try {

      const username =
        sessionStorage.getItem(
          "username"
        );

      const token =
        sessionStorage.getItem(
          "sessionToken"
        );

      // no session
      if (!username || !token) {
        return;
      }

      const res = await fetch(

        API_URL +

        "?action=verifySession" +

        "&username=" +
        encodeURIComponent(username) +

        "&token=" +
        encodeURIComponent(token),

        {
          cache: "no-store",
          keepalive: true
        }

      );

      const data =
        await res.json();

      // =====================================
      // SESSION INVALID
      // =====================================

      if (!data.success) {

        clearInterval(
          sessionMonitor
        );

        sessionMonitor = null;

        alert(
          "账号已在其他设备登录"
        );

        logout();

      }

    } catch (err) {

      console.log(
        "session verify failed",
        err
      );

    }

  }, 30000);

}

function resetIdleTimer(){

clearTimeout(idleTimer);

const idleLimit=

Number(
sessionStorage.getItem(
"idleLimit"
)
) ||

DEFAULT_IDLE_LIMIT;

idleTimer=setTimeout(()=>{

alert("Session expired");

logout();

},idleLimit);

}

// =====================================
// SHOW APP
// =====================================

function showApp() {

  hideAll();

  document.getElementById("home")
    .style.display = "block";

}

// =====================================
// SHOW LOGIN PAGE
// =====================================

function showLoginPage() {

  hideAll();

  document.getElementById("loginPage")
    .style.display = "block";

  // reset UI state
  document.getElementById("loginError")
    .innerHTML = "";

  document.getElementById("username").value = "";
  document.getElementById("password").value = "";

}

// =====================================
// LOGIN LOADING
// =====================================

function showLoginLoading() {

  document.getElementById("loginError")
    .innerHTML =
    "⏳ Logging in...";

}

function formatTime(ts) {
  const d = new Date(ts);

  return d.toLocaleString("sv-SE", {
    timeZone: "Asia/Kuala_Lumpur",
    hour12: false
  }).replace(",", "");
}

// =====================================
// API CALL
// =====================================

function callAPI(id) {

  showLoading();

  const controller = new AbortController();

  const timeout = setTimeout(() => {

    controller.abort();

  }, 20000);

  fetch(

    API_URL + "?id=" +
    encodeURIComponent(id),

    {
      signal: controller.signal,
      cache: "no-store",
      keepalive: true
    }

  )

  .then(r => r.json())

  .then(data => {

    handleResult(data);

  })

  .catch(() => {

    handleResult({

      type: "error",

      message:
      "Network error / timeout"

    });

  })

  .finally(() => {

    clearTimeout(timeout);

  });

}

// =====================================
// OPEN SCAN
// =====================================

async function openScan() {

  currentMode = "scan";

  hideAll();

  document.getElementById("scanPage")
    .style.display = "block";

  // =====================================
  // CREATE SCANNER ONCE
  // =====================================

  if (!scanner) {

    scanner = new Html5Qrcode("scanner");

  }

  // =====================================
  // IF ALREADY STARTED
  // JUST RESUME
  // =====================================

  if (scannerStarted) {

    try {

      await scanner.resume();

      scanCooldown = false;

    } catch (err) {

      console.log(err);

    }

    return;

  }

  // =====================================
  // FIRST START
  // =====================================

  try {

    await scanner.start(

      {
        facingMode: "environment"
      },

      {
        fps: 15,
        qrbox: 250,
        aspectRatio: 1
      },

      onScanSuccess

    );

    scannerStarted = true;

    scanCooldown = false;

  } catch (err) {

    alert("Camera failed");

    console.log(err);

  }

}

// =====================================
// SCAN SUCCESS
// =====================================

async function onScanSuccess(text) {

  if (scanCooldown) return;

  scanCooldown = true;

  if (navigator.vibrate) {

    navigator.vibrate(80);

  }

  await scanner.pause(true);

  callAPI(text);

}

// =====================================
// MANUAL
// =====================================

function openManual() {

  currentMode = "manual";

  hideAll();

  document.getElementById("manualPage")
    .style.display = "block";

  const input =
    document.getElementById("idInput");

  input.value = "";

  input.focus();

}

function manualCheck() {

  const id =
    document.getElementById("idInput")
      .value
      .trim();

  if (!id) return;

  callAPI(id);

}

// =====================================
// HANDLE RESULT
// =====================================

function handleResult(data) {

  resetIdleTimer();
  
  hideAll();

  const page =
    document.getElementById("resultPage");

  page.style.display = "block";

  let html = "";

  // =====================================
  // SUCCESS
  // =====================================

  if (data.type === "success") {

    page.className = "success";

    html = `

      <div style="
      font-size:70px;
      color:green;
      font-weight:bold;
      ">
        ${data.chineseName}
      </div>

      <div style="
      font-size:40px;
      ">
        ${data.englishName}
      </div>

      <br>

      <div style="
      font-size:30px;
      ">
        Checked In
      </div>

      <div style="
      font-size:26px;
      ">
        ${formatTime(data.time)}
      </div>

    `;

    beep.currentTime = 0;

    beep.play();

    db.ref("count")
      .transaction(v => (v || 0) + 1);

  }

  // =====================================
  // DUPLICATE
  // =====================================

  else if (data.type === "duplicate") {

    page.className = "duplicate";

    html = `

      <div style="
      font-size:50px;
      color:orange;
      ">
        Already Checked In
      </div>

      <br>

      <div style="
      font-size:60px;
      ">
        ${data.chineseName}
      </div>

      <div style="
      font-size:40px;
      ">
        ${data.englishName}
      </div>

      <br>

      <div style="
      font-size:28px;
      ">
        Check-in Time
      </div>

      <div style="
      font-size:32px;
      ">
        ${formatTime(data.time)}
      </div>

    `;

  }

  // =====================================
  // ERROR
  // =====================================

  else {

    page.className = "error";

    html = `

      <div style="
      font-size:50px;
      color:red;
      ">
        ${data.message}
      </div>

    `;

  }

  document.getElementById("resultContent")
    .innerHTML = html;

}

// =====================================
// NEXT ACTION
// =====================================

async function nextAction() {

  if (currentMode === "scan") {

    hideAll();

    document.getElementById("scanPage")
      .style.display = "block";

    scanCooldown = false;

    if (scanner) {

      await scanner.resume();

    }

    return;

  }

  openManual();

}

// =====================================
// HOME
// =====================================

async function goHome() {

  hideAll();

  document.getElementById("home")
    .style.display = "block";

  scanCooldown = false;

  if (scanner && scannerStarted) {

    try {

      await scanner.pause(true);

    } catch(e){}

  }

}

function loadDashboard() {

  fetch(API_URL + "?action=dashboard", {
    cache: "no-store"
  })
  .then(r => r.json())
  .then(d => {

    document.getElementById("d_total").innerText = d.total || 0;
    document.getElementById("d_checked").innerText = d.checked || 0;
    document.getElementById("d_pending").innerText = d.pending || 0;
    document.getElementById("d_a").innerText = d.a || 0;
    document.getElementById("d_b").innerText = d.b || 0;

  })
  .catch(() => {});

}

function openDashboard() {

  hideAll();

  document.getElementById("dashboardPage")
    .style.display = "block";

  loadDashboard(); // 进来就刷新一次

}

// ============================
// SMART WARMUP SYSTEM
// ============================

function shouldWarmup() {

  const last =
    Number(
      localStorage.getItem(WARMUP_KEY) || "0"
    );

  return (
    Date.now() - last >
    WARMUP_COOLDOWN
  );

}

function smartWarmup(type = "smart") {

  if (!shouldWarmup()) return;

  const url =

    API_URL +

    "?action=warmup" +

    "&type=" + encodeURIComponent(type);

  try {

    navigator.sendBeacon(url);

  } catch (err) {}

  localStorage.setItem(
    WARMUP_KEY,
    Date.now().toString()
  );

}
