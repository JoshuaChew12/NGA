<style>
/* =================================================== */
/* 全局基础重置：冰川薄荷绿高级调色盘（无粉色，极致高级） */
/* =================================================== */
body {
  margin: 0;
  padding: 0;
  /* 换成现代苹果原生的无衬线字体，极为克制高级 */
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", Arial, sans-serif;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #f1f5f9; /* 极为干净的冰川浅灰底色 */
  color: #0f172a; /* 极深的石墨灰文字（绝不用死黑，高级感的核心） */
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* =================================================== */
/* ⚡ 核心进化 1：全屏高级动态“立体大泡泡”背景层 */
/* =================================================== */
.bubble-bg-container {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: -1;
  overflow: hidden;
  background: radial-gradient(circle at 50% 0%, #e0f2fe 0%, #f1f5f9 100%); /* 渐变水光底色 */
}

/* 巨型泡泡的基础样式：运用强模糊和微渐变，营造晶莹剔透的水滴饱满感 */
.giant-bubble {
  position: absolute;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(20, 184, 166, 0.15) 0%, rgba(56, 189, 248, 0.12) 100%);
  filter: blur(24px); /* 强模糊制造空气感，绝不死板 */
  animation: floatBubble 12s ease-in-out infinite alternate;
}

/* 定义 3 个不同大小、不同轨道的巨型泡泡 */
.b1 { width: 320px; height: 320px; top: -5%; left: -10%; animation-duration: 14s; }
.b2 { width: 280px; height: 280px; top: 40%; right: -15%; animation-duration: 18s; animation-delay: -2s; }
.b3 { width: 220px; height: 220px; bottom: -5%; left: 15%; animation-duration: 16s; }

@keyframes floatBubble {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(25px, 35px) scale(1.1); } /* 缓缓位移和膨胀 */
}

/* =================================================== */
/* 具有物理厚度的立体输入框 */
/* =================================================== */
input {
  padding: 16px;
  font-size: 17px;
  width: 230px;
  background: #ffffff;
  border: 1px solid rgba(15, 23, 42, 0.06);
  border-radius: 16px;
  color: #0f172a;
  text-align: center;
  outline: none;
  /* 细腻内阴影，制造框体向内深陷的机械高级感 */
  box-shadow: 
    inset 0 2px 4px rgba(15, 23, 42, 0.04),
    0 4px 12px rgba(15, 23, 42, 0.02);
  transition: all 0.25s ease;
}
input:focus {
  border-color: #0ea5e9;
  box-shadow: 
    0 0 0 4px rgba(14, 165, 233, 0.1),
    0 8px 20px rgba(14, 165, 233, 0.05);
}
input::placeholder {
  color: #94a3b8;
}

/* 现代独立实体大按钮 */
button {
  padding: 14px 28px;
  margin: 10px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 16px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); /* 选用沉稳奢华的石墨深灰按钮 */
  color: #ffffff;
  box-shadow: 
    0 10px 24px rgba(15, 23, 42, 0.15),
    0 4px 8px rgba(15, 23, 42, 0.1),
    inset 0 1px 0 rgba(255, 255, 255, 0.1);
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  letter-spacing: 0.5px;
}
button:active {
  transform: scale(0.95);
}

/* 修复主页网格布局：绝对水平居中 */
#home > div {
  grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
  gap: 20px 14px !important; /* 纵向留出空间给 3D 侧边厚度层 */
  width: 100% !important;
  max-width: 100% !important;
  padding: 10px 4px !important;
  margin: 0 auto !important;
  box-sizing: border-box !important;
}

/* =================================================== */
/* ⚡ 核心进化 2：液态水滴晶体卡片（冰川矿石白晶版） */
/* =================================================== */
.homeCard {
  height: 105px;
  padding: 12px 6px !important; /* 精简内部 padding，消除多余空隙 */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  box-sizing: border-box;
  
  background: #ffffff; /* 温润饱满的牛奶晶体纯白 */
  border-radius: 24px; /* 极致圆润胖乎乎的水滴大圆角，呼应背景大泡泡 */
  cursor: pointer;
  width: 100%;
  border: 1px solid rgba(255, 255, 255, 0.9);
  
  /* 【绝对立体感核心】：利用 5px 偏置的矿石浅灰投影，在泡泡背景上死死压出实体的侧面厚度 */
  box-shadow: 
    0 5px 0px #cbd5e1, /* 极具质感的矿石灰实体厚度层（肉眼可见的立体感！） */
    0 14px 28px rgba(148, 163, 184, 0.3), /* 远端扩散的柔和环境投影 */
    inset 0 1.5px 0px #ffffff;
    
  transition: all 0.12s cubic-bezier(0.4, 0, 0.2, 1); /* 利落的下按回弹 */
}

/* 【极致解压的下踩回弹手感】：点击时，5px 的厚度瞬间被手指“压平”入手机屏幕 */
.homeCard:active {
  transform: translateY(5px) scale(0.96); /* 垂直向下位移等于厚度 */
  background: #f8fafc; /* 按下时卡片颜色微微变深，模拟受力 */
  
  box-shadow: 
    0 0px 0px transparent, 
    0 4px 10px rgba(148, 163, 184, 0.15),
    inset 0 1px 0px rgba(0,0,0,0.02);
}

/* 分区色彩独立图标槽 */
.homeCard:nth-child(1) .homeIcon { background: #e0f2fe; color: #0369a1; } 
.homeCard:nth-child(2) .homeIcon { background: #fef3c7; color: #b45309; } 
.homeCard:nth-child(3) .homeIcon { background: #ecfdf5; color: #047857; } 
.homeCard:nth-child(4) .homeIcon { background: #f5f3ff; color: #6d28d9; } 
.homeCard:nth-child(5) .homeIcon { background: #fdf2f8; color: #be185d; } 
.homeCard:nth-child(6) .homeIcon { background: #fef2f2; color: #b91c1c; } 

/* 独立图标槽组件（带微小立体下沉线） */
.homeIcon {
  font-size: 20px;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 14px;
  margin-bottom: 6px;
  line-height: 1;
  box-shadow: 0 2px 0px rgba(0, 0, 0, 0.03); 
}

.homeText {
  font-size: 14px;
  font-weight: 800; /* 加粗字体，极具大厂 App 精致质感 */
  line-height: 1.2;
  color: #334155; /* 优雅的钢石深灰字，高级低反差 */
  letter-spacing: -0.1px;
}

/* 高级打磨的状态提示气泡 */
.success { background: #e6f9ed !important; border: 1px solid #a7f3d0 !important; color: #047857 !important; border-radius: 14px; }
.duplicate { background: #fffbeb !important; border: 1px solid #fde68a !important; color: #b45309 !important; border-radius: 14px; }
.error { background: #fff5f5 !important; border: 2px solid #fecaca !important; color: #b91c1c !important; border-radius: 14px; }

/* 登录面板、子页面大容器：重构为高级半透明冰川磨砂舱 */
.loginBox {
  margin-top: 40px;
  background: rgba(255, 255, 255, 0.8);
  padding: 35px 25px;
  border-radius: 24px;
  border: 1px solid rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(25px); /* 极强的毛玻璃折射效果 */
  box-shadow: 
    0 10px 30px rgba(148, 163, 184, 0.1), 
    0 30px 60px rgba(148, 163, 184, 0.2);
}

/* 应用主内容外层总容器 */
#appContainer {
  width: 100%;
  max-width: 520px;
  padding: 20px;
  box-sizing: border-box;
  position: relative;
  z-index: 1;
}

/* 看板、签到核心数据数字高亮 */
#count, #d_total, #d_checked, #d_pending, #d_a, #d_b {
  color: #0ea5e9; /* 极地深天蓝 */
  font-weight: 800;
  font-size: 1.2em;
}

/* 顶部教会系统大气的排版和字重对比 */
h2 {
  font-size: 26px !important;
  font-weight: 800;
  color: #0f172a; /* 干净深沉的钢石黑 */
  margin-bottom: 6px !important;
  letter-spacing: -0.5px;
}
h3 {
  font-size: 18px !important;
  color: #475569;
  font-weight: 600;
  margin-top: 0;
}
h4 {
  font-size: 13px !important;

  font-weight: 500;
  letter-spacing: 1px;
}
h5 {
  color: #334155;
  font-size: 15px !important;
  background: #ffffff;
  padding: 8px 18px;
  border-radius: 20px;
  display: inline-block;
  box-shadow: 0 4px 12px rgba(148, 163, 184, 0.15);
  border: 1px solid rgba(255,255,255,0.5);
}
</style>
  
</head>

<script>

// =====================================
// CONFIG
// =====================================

const API_URL =
"https://script.google.com/macros/s/AKfycbx0J4r_E2dRfHPV7TyJNf4-h-MJzSkfRB4f2aeFi1fRgO-Osw4ekVAADVAL4qWluI4h/exec";

// =====================================
// FIREBASE
// =====================================

firebase.initializeApp({

  databaseURL:
  "https://nga-worship-default-rtdb.asia-southeast1.firebasedatabase.app/"

});

const db = firebase.database();

// realtime counter

db.ref("count").on("value", snap => {

  document.getElementById("count")
    .innerText = snap.val() || 0;

});

// =====================================
// GLOBALS
// =====================================

let scanner = null;
let scannerStarted = false;
let currentMode = "";
let scanCooldown = false;
let idleTimer = null;

const DEFAULT_IDLE_LIMIT = 10 * 60 * 1000;
const WARMUP_KEY = "gas_warmup_last";
const WARMUP_COOLDOWN = 4 * 60 * 1000;

// =====================================
// PRELOAD BEEP
// =====================================

const beep = new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

beep.preload = "auto";

// =====================================
// APP START
// =====================================

window.addEventListener("load", () => {

  // initial warm
  smartWarmup("full");

  // keep warm
  setInterval(() => {

    smartWarmup("smart");

  }, 4 * 60 * 1000);
  
  ["click","touchstart","keypress"].forEach(event => {

  document.addEventListener(event, () => {

    if (
      sessionStorage.getItem("auth") === "true"
    ) {
      resetIdleTimer();
    }

  });

});
  
  // =====================================
  // LOGIN CHECK
  // =====================================

  const auth =
    sessionStorage.getItem("auth");

  if (auth === "true") {

    startSessionMonitor();

    showApp();

  } else {

    showLoginPage();

  }

});

// =====================================
// LOGIN
// =====================================

function login() {

  smartWarmup("login_fallback");
  
  const username =
    document.getElementById("username")
      .value
      .trim();

  const password =
    document.getElementById("password")
      .value
      .trim();

  // =====================================
  // EMPTY CHECK
  // =====================================

  if (!username || !password) {

    document.getElementById("loginError")
      .innerText =
      "Enter username and password";

    return;

  }

  // =====================================
  // LOADING
  // =====================================

  showLoginLoading();

  // =====================================
  // TIMEOUT PROTECTION
  // =====================================

  const controller =
    new AbortController();

  const timeout =
    setTimeout(() => {

      controller.abort();

    }, 20000);

  // =====================================
  // LOGIN REQUEST
  // =====================================

  fetch(

    API_URL +

    "?action=login" +

    "&username=" +
    encodeURIComponent(username) +

    "&password=" +
    encodeURIComponent(password),

    {

      signal: controller.signal,

      cache: "no-store",

      keepalive: true

    }

  )

  .then(r => r.json())

  .then(data => {

    // =====================================
    // SUCCESS
    // =====================================

    if (data.success) {

      sessionStorage.setItem(
        "auth",
        "true"
      );

      sessionStorage.setItem(
        "username",
        data.username
      );

      sessionStorage.setItem(
        "role",
        data.role
      );

      // =====================================
      // SAVE SESSION TOKEN
      // =====================================

      sessionStorage.setItem(
        "sessionToken",
        data.token
      );

      sessionStorage.setItem(
        "idleLimit",
        data.idleLimit
      );
      
      resetIdleTimer();

      // start session monitor
      startSessionMonitor();

      showApp();

      return;

    }

    // =====================================
    // INVALID LOGIN
    // =====================================

    document.getElementById("loginError")
      .innerText =
      "Invalid username or password";

    showLoginPage();

  })

  // =====================================
  // NETWORK ERROR / TIMEOUT
  // =====================================

  .catch(err => {

    // timeout
    if (err.name === "AbortError") {

      document.getElementById("loginError")
        .innerText =
        "Login timeout";

      showLoginPage();

      return;

    }

    // other network errors
    document.getElementById("loginError")
      .innerText =
      "Network error";

    showLoginPage();

  })

  // =====================================
  // CLEAR TIMER
  // =====================================

  .finally(() => {

    clearTimeout(timeout);

  });

}

// =====================================
// LOGOUT
// =====================================

function logout() {

  // stop monitor
  if (sessionMonitor) {

    clearInterval(
      sessionMonitor
    );

    sessionMonitor = null;

  }

  sessionStorage.clear();

  goHome();

  hideAll();

  showLoginPage();

}

let sessionMonitor = null;

function startSessionMonitor() {

  // avoid duplicate interval
  if (sessionMonitor) {
    return;
  }

  sessionMonitor = setInterval(async () => {

    try {

      const username =
        sessionStorage.getItem(
          "username"
        );

      const token =
        sessionStorage.getItem(
          "sessionToken"
        );

      // no session
      if (!username || !token) {
        return;
      }

      const res = await fetch(

        API_URL +

        "?action=verifySession" +

        "&username=" +
        encodeURIComponent(username) +

        "&token=" +
        encodeURIComponent(token),

        {
          cache: "no-store",
          keepalive: true
        }

      );

      const data =
        await res.json();

      // =====================================
      // SESSION INVALID
      // =====================================

      if (!data.success) {

        clearInterval(
          sessionMonitor
        );

        sessionMonitor = null;

        alert(
          "账号已在其他设备登录"
        );

        logout();

      }

    } catch (err) {

      console.log(
        "session verify failed",
        err
      );

    }

  }, 30000);

}

function resetIdleTimer(){

clearTimeout(idleTimer);

const idleLimit=

Number(
sessionStorage.getItem(
"idleLimit"
)
) ||

DEFAULT_IDLE_LIMIT;

idleTimer=setTimeout(()=>{

alert("Session expired");

logout();

},idleLimit);

}

// =====================================

function formatTime(ts) {
  const d = new Date(ts);

  return d.toLocaleString("sv-SE", {
    timeZone: "Asia/Kuala_Lumpur",
    hour12: false
  }).replace(",", "");
}

// =====================================
// API CALL
// =====================================

function callAPI(id) {

  showLoading();

  const controller = new AbortController();

  const timeout = setTimeout(() => {

    controller.abort();

  }, 20000);

  fetch(

    API_URL + "?id=" +
    encodeURIComponent(id),

    {
      signal: controller.signal,
      cache: "no-store",
      keepalive: true
    }

  )

  .then(r => r.json())

  .then(data => {

    handleResult(data);

  })

  .catch(() => {

    handleResult({

      type: "error",

      message:
      "Network error / timeout"

    });

  })

  .finally(() => {

    clearTimeout(timeout);

  });

}

// =====================================
// OPEN SCAN
// =====================================

async function openScan() {

  currentMode = "scan";

  hideAll();

  document.getElementById("scanPage")
    .style.display = "block";

  // =====================================
  // CREATE SCANNER ONCE
  // =====================================

  if (!scanner) {

    scanner = new Html5Qrcode("scanner");

  }

  // =====================================
  // IF ALREADY STARTED
  // JUST RESUME
  // =====================================

  if (scannerStarted) {

    try {

      await scanner.resume();

      scanCooldown = false;

    } catch (err) {

      console.log(err);

    }

    return;

  }

  // =====================================
  // FIRST START
  // =====================================

  try {

    await scanner.start(

      {
        facingMode: "environment"
      },

      {
        fps: 15,
        qrbox: 250,
        aspectRatio: 1
      },

      onScanSuccess

    );

    scannerStarted = true;

    scanCooldown = false;

  } catch (err) {

    alert("Camera failed");

    console.log(err);

  }

}

// =====================================
// SCAN SUCCESS
// =====================================

async function onScanSuccess(text) {

  if (scanCooldown) return;

  scanCooldown = true;

  if (navigator.vibrate) {

    navigator.vibrate(80);

  }

  await scanner.pause(true);

  callAPI(text);

}

// =====================================
// HANDLE RESULT
// =====================================

function handleResult(data) {

  resetIdleTimer();
  
  hideAll();

  const page =
    document.getElementById("resultPage");

  page.style.display = "block";

  let html = "";

  // =====================================
  // SUCCESS
  // =====================================

  if (data.type === "success") {

    page.className = "success";

    html = `

      <div style="
      font-size:70px;
      color:green;
      font-weight:bold;
      ">
        ${data.chineseName}
      </div>

      <div style="
      font-size:40px;
      ">
        ${data.englishName}
      </div>

      <br>

      <div style="
      font-size:30px;
      ">
        Checked In
      </div>

      <div style="
      font-size:26px;
      ">
        ${formatTime(data.time)}
      </div>

    `;

    beep.currentTime = 0;

    beep.play();

    db.ref("count")
      .transaction(v => (v || 0) + 1);

  }

  // =====================================
  // DUPLICATE
  // =====================================

  else if (data.type === "duplicate") {

    page.className = "duplicate";

    html = `

      <div style="
      font-size:50px;
      color:orange;
      ">
        Already Checked In
      </div>

      <br>

      <div style="
      font-size:60px;
      ">
        ${data.chineseName}
      </div>

      <div style="
      font-size:40px;
      ">
        ${data.englishName}
      </div>

      <br>

      <div style="
      font-size:28px;
      ">
        Check-in Time
      </div>

      <div style="
      font-size:32px;
      ">
        ${formatTime(data.time)}
      </div>

    `;

  }

  // =====================================
  // ERROR
  // =====================================

  else {

    page.className = "error";

    html = `

      <div style="
      font-size:50px;
      color:red;
      ">
        ${data.message}
      </div>

    `;

  }

  document.getElementById("resultContent")
    .innerHTML = html;

}

// ============================
// SMART WARMUP SYSTEM
// ============================

function shouldWarmup() {

  const last =
    Number(
      localStorage.getItem(WARMUP_KEY) || "0"
    );

  return (
    Date.now() - last >
    WARMUP_COOLDOWN
  );

}

function smartWarmup(type = "smart") {

  if (!shouldWarmup()) return;

  const url =

    API_URL +

    "?action=warmup" +

    "&type=" + encodeURIComponent(type);

  try {

    navigator.sendBeacon(url);

  } catch (err) {}

  localStorage.setItem(
    WARMUP_KEY,
    Date.now().toString()
  );

}
