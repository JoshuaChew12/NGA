<style>
/* =================================================== */
/* 🎨 皮肤颜色调控舱：已一键切回【冰川极光青】（100%锁死App手感） */
/* =================================================== */
:root {
  --app-bg-dark: #060b19;      /* 页面最底层深邃蓝黑基底 */
  --app-text-main: #1e293b;    /* 核心卡片内部高级石墨深灰文字（低反差，绝非粉色） */
  --app-text-sub: #475569;     /* 辅助暗灰文字 */
  
  /* 3D 泡泡光影色 */
  --bubble-light-glow: rgba(45, 212, 191, 0.4);  /* 泡泡内部的极光青折射光 */
  --bubble-deep-shadow: rgba(6, 11, 25, 0.5);    /* 泡泡后方聚光的暗边 */
  
  /* 3D 悬浮组件核心色：晶莹白晶卡面 + 5px 极光青实体厚度底座 */
  --card-face: #ffffff;        /* 饱满牛奶晶体纯白（卡片正面） */
  --card-base-3d: #0d9488;     /* 核心：5px 极光青实体侧边厚度层 */
  --card-press-bg: #f0fdfa;    /* 手指按住卡片下踩时，卡片正面受力变深的微调色 */
}

/* 全局基础重置 */
body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", Arial, sans-serif;
  text-align: center; display: flex; flex-direction: column; align-items: center;
  background: var(--app-bg-dark); color: var(--app-text-main);
  min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
}

/* =================================================== */
/* ⚡ 组件 1：全屏局部浅亮高光 + 4个柔和镜面亮光大泡泡背景层 */
/* =================================================== */
.bubble-bg-container {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden;
  /* 背景：中部和上方注入大面积的浅亮色高光（晨曦蓝白与极光青晕染），让屏幕通透舒服 */
  background: radial-gradient(circle at 50% 15%, #e0f2fe 0%, rgba(204, 251, 241, 0.8) 30%, #0c172a 70%, var(--app-bg-dark) 100%); 
}

/* 3D 水晶大泡泡核心魔改：圆形柔和镜面反射亮光（Specular Highlight） */
.giant-bubble {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.6) 0%, var(--bubble-light-glow) 30%, rgba(14, 165, 233, 0.15) 70%, transparent 100%);
  border: 1.5px solid rgba(255, 255, 255, 0.7); /* 清晰的玻璃轮廓线 */
  filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.4)) drop-shadow(0 0 25px rgba(45, 212, 191, 0.25));
  box-shadow: inset 10px 10px 20px rgba(255, 255, 255, 0.8), inset -12px -12px 25px var(--bubble-deep-shadow);
  animation: floatBubble 14s ease-in-out infinite alternate;
}

/* 在泡泡表面切出圆润饱满的圆形反射亮光点，极具物理球面弧度感 */
.giant-bubble::before {
  content: ''; position: absolute; top: 12%; left: 16%; width: 32%; height: 32%; border-radius: 50%;
  background: radial-gradient(circle at center, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.4) 40%, transparent 75%);
}

/* ⚡ 重新排配的 4 个大泡泡：尺寸高低错落，覆盖全屏四个角落，视觉更丰富 */
.b1 { width: 280px; height: 280px; top: -4%; left: 4%; animation-duration: 15s; }
.b2 { width: 230px; height: 230px; top: 42%; right: -8%; animation-duration: 19s; animation-delay: -3s; }
.b3 { width: 190px; height: 190px; bottom: -3%; left: 12%; animation-duration: 17s; }
.b4 { width: 160px; height: 160px; top: 28%; left: 4%; animation-duration: 13s; animation-delay: -5s; } /* 新增的第4个右上腹部小巨型泡泡 */

@keyframes floatBubble { 0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.85; } 100% { transform: translate(15px, 25px) scale(1.06) rotate(4deg); opacity: 1; } }

/* =================================================== */
/* ⚡ 组件 2：Login 登录面板（白晶舱体，完美融合背景高光） */

<script>

// =====================================
// CONFIG
// =====================================

const API_URL =
"https://script.google.com/macros/s/AKfycbx0J4r_E2dRfHPV7TyJNf4-h-MJzSkfRB4f2aeFi1fRgO-Osw4ekVAADVAL4qWluI4h/exec";

// =====================================
// FIREBASE
// =====================================

firebase.initializeApp({

  databaseURL:
  "https://nga-worship-default-rtdb.asia-southeast1.firebasedatabase.app/"

});

const db = firebase.database();

// realtime counter

db.ref("count").on("value", snap => {

  document.getElementById("count")
    .innerText = snap.val() || 0;

});

// =====================================
// GLOBALS
// =====================================

let scanner = null;
let scannerStarted = false;
let currentMode = "";
let scanCooldown = false;
let idleTimer = null;

const DEFAULT_IDLE_LIMIT = 10 * 60 * 1000;
const WARMUP_KEY = "gas_warmup_last";
const WARMUP_COOLDOWN = 4 * 60 * 1000;

// =====================================
// PRELOAD BEEP
// =====================================

const beep = new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

beep.preload = "auto";

// =====================================
// APP START
// =====================================

window.addEventListener("load", () => {

  // initial warm
  smartWarmup("full");

  // keep warm
  setInterval(() => {

    smartWarmup("smart");

  }, 4 * 60 * 1000);
  
  ["click","touchstart","keypress"].forEach(event => {

  document.addEventListener(event, () => {

    if (
      sessionStorage.getItem("auth") === "true"
    ) {
      resetIdleTimer();
    }

  });

});
  
  // =====================================
  // LOGIN CHECK
  // =====================================

  const auth =
    sessionStorage.getItem("auth");

  if (auth === "true") {

    startSessionMonitor();

    showApp();

  } else {

    showLoginPage();

  }

});

// =====================================
// LOGIN
// =====================================

function login() {

  smartWarmup("login_fallback");
  
  const username =
    document.getElementById("username")
      .value
      .trim();

  const password =
    document.getElementById("password")
      .value
      .trim();

  // =====================================
  // EMPTY CHECK
  // =====================================

  if (!username || !password) {

    document.getElementById("loginError")
      .innerText =
      "Enter username and password";

    return;

  }

  // =====================================
  // LOADING
  // =====================================

  showLoginLoading();

  // =====================================
  // TIMEOUT PROTECTION
  // =====================================

  const controller =
    new AbortController();

  const timeout =
    setTimeout(() => {

      controller.abort();

    }, 20000);

  // =====================================
  // LOGIN REQUEST
  // =====================================

  fetch(

    API_URL +

    "?action=login" +

    "&username=" +
    encodeURIComponent(username) +

    "&password=" +
    encodeURIComponent(password),

    {

      signal: controller.signal,

      cache: "no-store",

      keepalive: true

    }

  )

  .then(r => r.json())

  .then(data => {

    // =====================================
    // SUCCESS
    // =====================================

    if (data.success) {

      sessionStorage.setItem(
        "auth",
        "true"
      );

      sessionStorage.setItem(
        "username",
        data.username
      );

      sessionStorage.setItem(
        "role",
        data.role
      );

      // =====================================
      // SAVE SESSION TOKEN
      // =====================================

      sessionStorage.setItem(
        "sessionToken",
        data.token
      );

      sessionStorage.setItem(
        "idleLimit",
        data.idleLimit
      );
      
      resetIdleTimer();

      // start session monitor
      startSessionMonitor();

      showApp();

      return;

    }

    // =====================================
    // INVALID LOGIN
    // =====================================

    document.getElementById("loginError")
      .innerText =
      "Invalid username or password";

    showLoginPage();

  })

  // =====================================
  // NETWORK ERROR / TIMEOUT
  // =====================================

  .catch(err => {

    // timeout
    if (err.name === "AbortError") {

      document.getElementById("loginError")
        .innerText =
        "Login timeout";

      showLoginPage();

      return;

    }

    // other network errors
    document.getElementById("loginError")
      .innerText =
      "Network error";

    showLoginPage();

  })

  // =====================================
  // CLEAR TIMER
  // =====================================

  .finally(() => {

    clearTimeout(timeout);

  });

}

// =====================================
// LOGOUT
// =====================================

function logout() {

  // stop monitor
  if (sessionMonitor) {

    clearInterval(
      sessionMonitor
    );

    sessionMonitor = null;

  }

  sessionStorage.clear();

  goHome();

  hideAll();

  showLoginPage();

}

let sessionMonitor = null;

function startSessionMonitor() {

  // avoid duplicate interval
  if (sessionMonitor) {
    return;
  }

  sessionMonitor = setInterval(async () => {

    try {

      const username =
        sessionStorage.getItem(
          "username"
        );

      const token =
        sessionStorage.getItem(
          "sessionToken"
        );

      // no session
      if (!username || !token) {
        return;
      }

      const res = await fetch(

        API_URL +

        "?action=verifySession" +

        "&username=" +
        encodeURIComponent(username) +

        "&token=" +
        encodeURIComponent(token),

        {
          cache: "no-store",
          keepalive: true
        }

      );

      const data =
        await res.json();

      // =====================================
      // SESSION INVALID
      // =====================================

      if (!data.success) {

        clearInterval(
          sessionMonitor
        );

        sessionMonitor = null;

        alert(
          "账号已在其他设备登录"
        );

        logout();

      }

    } catch (err) {

      console.log(
        "session verify failed",
        err
      );

    }

  }, 30000);

}

function resetIdleTimer(){

clearTimeout(idleTimer);

const idleLimit=

Number(
sessionStorage.getItem(
"idleLimit"
)
) ||

DEFAULT_IDLE_LIMIT;

idleTimer=setTimeout(()=>{

alert("Session expired");

logout();

},idleLimit);

}

function formatTime(ts) {
  const d = new Date(ts);

  return d.toLocaleString("sv-SE", {
    timeZone: "Asia/Kuala_Lumpur",
    hour12: false
  }).replace(",", "");
}

// =====================================
// API CALL
// =====================================

function callAPI(id) {

  showLoading();

  const controller = new AbortController();

  const timeout = setTimeout(() => {

    controller.abort();

  }, 20000);

  fetch(

    API_URL + "?id=" +
    encodeURIComponent(id),

    {
      signal: controller.signal,
      cache: "no-store",
      keepalive: true
    }

  )

  .then(r => r.json())

  .then(data => {

    handleResult(data);

  })

  .catch(() => {

    handleResult({

      type: "error",

      message:
      "Network error / timeout"

    });

  })

  .finally(() => {

    clearTimeout(timeout);

  });

}

// =====================================
// OPEN SCAN
// =====================================

async function openScan() {

  currentMode = "scan";

  hideAll();

  document.getElementById("scanPage")
    .style.display = "block";

  // =====================================
  // CREATE SCANNER ONCE
  // =====================================

  if (!scanner) {

    scanner = new Html5Qrcode("scanner");

  }

  // =====================================
  // IF ALREADY STARTED
  // JUST RESUME
  // =====================================

  if (scannerStarted) {

    try {

      await scanner.resume();

      scanCooldown = false;

    } catch (err) {

      console.log(err);

    }

    return;

  }

  // =====================================
  // FIRST START
  // =====================================

  try {

    await scanner.start(

      {
        facingMode: "environment"
      },

      {
        fps: 15,
        qrbox: 250,
        aspectRatio: 1
      },

      onScanSuccess

    );

    scannerStarted = true;

    scanCooldown = false;

  } catch (err) {

    alert("Camera failed");

    console.log(err);

  }

}

// =====================================
// SCAN SUCCESS
// =====================================

async function onScanSuccess(text) {

  if (scanCooldown) return;

  scanCooldown = true;

  if (navigator.vibrate) {

    navigator.vibrate(80);

  }

  await scanner.pause(true);

  callAPI(text);

}

// =====================================
// HANDLE RESULT
// =====================================

function handleResult(data) {

  resetIdleTimer();
  
  hideAll();

  const page =
    document.getElementById("resultPage");

  page.style.display = "block";

  let html = "";

  // =====================================
  // SUCCESS
  // =====================================

  if (data.type === "success") {

    page.className = "success";

    html = `

      <div style="
      font-size:70px;
      color:green;
      font-weight:bold;
      ">
        ${data.chineseName}
      </div>

      <div style="
      font-size:40px;
      ">
        ${data.englishName}
      </div>

      <br>

      <div style="
      font-size:30px;
      ">
        Checked In
      </div>

      <div style="
      font-size:26px;
      ">
        ${formatTime(data.time)}
      </div>

    `;

    beep.currentTime = 0;

    beep.play();

    db.ref("count")
      .transaction(v => (v || 0) + 1);

  }

  // =====================================
  // DUPLICATE
  // =====================================

  else if (data.type === "duplicate") {

    page.className = "duplicate";

    html = `

      <div style="
      font-size:50px;
      color:orange;
      ">
        Already Checked In
      </div>

      <br>

      <div style="
      font-size:60px;
      ">
        ${data.chineseName}
      </div>

      <div style="
      font-size:34px;
      ">
        ${data.englishName}
      </div>

      <br>

      <div style="
      font-size:22px;
      ">
        Check-in Time
      </div>

      <div style="
      font-size:24px;
      ">
        ${formatTime(data.time)}
      </div>

    `;

  }

  // =====================================
  // ERROR
  // =====================================

  else {

    page.className = "error";

    html = `

      <div style="
      font-size:50px;
      color:red;
      ">
        ${data.message}
      </div>

    `;

  }

  document.getElementById("resultContent")
    .innerHTML = html;

}

// ============================
// SMART WARMUP SYSTEM
// ============================

function shouldWarmup() {

  const last =
    Number(
      localStorage.getItem(WARMUP_KEY) || "0"
    );

  return (
    Date.now() - last >
    WARMUP_COOLDOWN
  );

}

function smartWarmup(type = "smart") {

  if (!shouldWarmup()) return;

  const url =

    API_URL +

    "?action=warmup" +

    "&type=" + encodeURIComponent(type);

  try {

    navigator.sendBeacon(url);

  } catch (err) {}

  localStorage.setItem(
    WARMUP_KEY,
    Date.now().toString()
  );

}
