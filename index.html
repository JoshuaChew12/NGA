<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
NGA Worship Check-in
</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div id="app">

<!-- =====================
HEADER
===================== -->

<header id="appHeader">

<h1>
NGA Worship Check-in
</h1>

<div id="counterBox">

Checked-in

<div id="checkCount">
0
</div>

</div>

</header>


<!-- =====================
PAGES
===================== -->

<main id="pages">


<!-- =====================
HOME
===================== -->

<section
id="homePage"
class="page active">

<div class="clock-card">

<div
class="clock"
id="clock">

00:00:00

</div>

<div
class="clock-day"
id="todayDay">

Sunday

</div>

<div
class="clock-date"
id="todayDate">

20 July 2026

</div>

</div>


<div
id="dashboard"
class="dashboard hidden">

</div>


<button
class="logout-btn">

Logout

</button>

</section>



<!-- =====================
MANUAL
===================== -->

<section
id="manualPage"
class="page">

<div class="counter-small">

Checked-in

<span id="manualCount">
0
</span>

</div>

<div class="card">

<h2>

Manual Check-in

</h2>

<input
id="manualInput"
placeholder="Enter ID">

<button>

Submit

</button>

</div>

</section>



<!-- =====================
SCAN
===================== -->

<section
id="scanPage"
class="page">

<div class="counter-small">

Checked-in

<span id="scanCount">
0
</span>

</div>

<div class="card">

<h2>

Scan QR

</h2>

<div
id="scanner">

</div>

<div
id="scanResult">

</div>

</div>

</section>



<!-- =====================
SEARCH
===================== -->

<section
id="searchPage"
class="page">

<div class="card">

<h2>

Search Member

</h2>

<input
id="searchInput"
placeholder="Name / ID">

<button>

Search

</button>

<div
id="searchResult">

</div>

</div>

</section>



<!-- =====================
REGISTER
===================== -->

<section
id="registerPage"
class="page">

<div class="card">

<h2>

New Registration

</h2>

<input
placeholder="Chinese Name">

<input
placeholder="English Name">

<input
placeholder="Phone">

<button>

Register

</button>

<div
id="registerResult">

</div>

</div>

</section>

</main>



<!-- =====================
BOTTOM NAV
===================== -->

<nav id="bottomNav">


<button
data-page="homePage">

🏠

<span>

Home

</span>

</button>



<button
data-page="manualPage">

⌨️

<span>

Manual

</span>

</button>



<button
id="scanNav">

<div class="scan-circle">

<div class="scan-icon">

📷

</div>

<div class="scan-text">

Scan

</div>

</div>

</button>



<button
data-page="searchPage">

🔍

<span>

Search

</span>

</button>



<button
data-page="registerPage">

📝

<span>

Register

</span>

</button>


</nav>

</div>


<script src="api.js"></script>

<script src="home.js"></script>

<script src="scan.js"></script>

<script src="search.js"></script>

<script src="register.js"></script>

<script src="app.js"></script>

</body>

</html>
