<script>

// =====================================
// CONFIG
// =====================================

const API_URL =
"https://script.google.com/macros/s/AKfycbx0J4r_E2dRfHPV7TyJNf4-h-MJzSkfRB4f2aeFi1fRgO-Osw4ekVAADVAL4qWluI4h/exec";

// =====================================
// FIREBASE
// =====================================

firebase.initializeApp({

  databaseURL:
  "https://nga-worship-default-rtdb.asia-southeast1.firebasedatabase.app/"

});

const db = firebase.database();

// realtime counter

db.ref("count").on("value", snap => {

  document.getElementById("count")
    .innerText = snap.val() || 0;

});

// =====================================
// GLOBALS
// =====================================

let scanner = null;
let scannerStarted = false;
let currentMode = "";
let scanCooldown = false;
let idleTimer = null;

const IDLE_LIMIT = 1 * 60 * 1000;
const WARMUP_KEY = "gas_warmup_last";
const WARMUP_COOLDOWN = 4 * 60 * 1000;

// =====================================
// PRELOAD BEEP
// =====================================

const beep = new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

beep.preload = "auto";

// =====================================
// APP START
// =====================================

window.addEventListener("load", () => {

  // initial warm
  smartWarmup("full");

  // keep warm
  setInterval(() => {

    smartWarmup("smart");

  }, 4 * 60 * 1000);
  
  ["click","touchstart","keypress"].forEach(event => {

  document.addEventListener(event, () => {

    if (
      sessionStorage.getItem("auth") === "true"
    ) {
      resetIdleTimer();
    }

  });

});
  
  // =====================================
  // LOGIN CHECK
  // =====================================

  const auth =
    sessionStorage.getItem("auth");

  if (auth === "true") {

    startSessionMonitor();

    showApp();

  } else {

    showLoginPage();

  }

});

// =====================================
// LOGIN
// =====================================

function login() {

  smartWarmup("login_fallback");
  
  const username =
    document.getElementById("username")
      .value
      .trim();

  const password =
    document.getElementById("password")
      .value
      .trim();

  // =====================================
  // EMPTY CHECK
  // =====================================

  if (!username || !password) {

    document.getElementById("loginError")
      .innerText =
      "Enter username and password";

    return;

  }

  // =====================================
  // LOADING
  // =====================================

  showLoginLoading();

  // =====================================
  // TIMEOUT PROTECTION
  // =====================================

  const controller =
    new AbortController();

  const timeout =
    setTimeout(() => {

      controller.abort();

    }, 20000);

  // =====================================
  // LOGIN REQUEST
  // =====================================

  fetch(

    API_URL +

    "?action=login" +

    "&username=" +
    encodeURIComponent(username) +

    "&password=" +
    encodeURIComponent(password),

    {

      signal: controller.signal,

      cache: "no-store",

      keepalive: true

    }

  )

  .then(r => r.json())

  .then(data => {

    // =====================================
    // SUCCESS
    // =====================================

    if (data.success) {

      sessionStorage.setItem(
        "auth",
        "true"
      );

      sessionStorage.setItem(
        "username",
        data.username
      );

      sessionStorage.setItem(
        "role",
        data.role
      );

      // =====================================
      // SAVE SESSION TOKEN
      // =====================================

      sessionStorage.setItem(
        "sessionToken",
        data.token
      );

      resetIdleTimer();

      // start session monitor
      startSessionMonitor();

      showApp();

      return;

    }

    // =====================================
    // INVALID LOGIN
    // =====================================

    document.getElementById("loginError")
      .innerText =
      "Invalid username or password";

    showLoginPage();

  })

  // =====================================
  // NETWORK ERROR / TIMEOUT
  // =====================================

  .catch(err => {

    // timeout
    if (err.name === "AbortError") {

      document.getElementById("loginError")
        .innerText =
        "Login timeout";

      showLoginPage();

      return;

    }

    // other network errors
    document.getElementById("loginError")
      .innerText =
      "Network error";

    showLoginPage();

  })

  // =====================================
  // CLEAR TIMER
  // =====================================

  .finally(() => {

    clearTimeout(timeout);

  });

}

// =====================================
// LOGOUT
// =====================================

function logout() {

  // stop monitor
  if (sessionMonitor) {

    clearInterval(
      sessionMonitor
    );

    sessionMonitor = null;

  }

  sessionStorage.clear();

  goHome();

  hideAll();

  showLoginPage();

}

let sessionMonitor = null;

function startSessionMonitor() {

  // avoid duplicate interval
  if (sessionMonitor) {
    return;
  }

  sessionMonitor = setInterval(async () => {

    try {

      const username =
        sessionStorage.getItem(
          "username"
        );

      const token =
        sessionStorage.getItem(
          "sessionToken"
        );

      // no session
      if (!username || !token) {
        return;
      }

      const res = await fetch(

        API_URL +

        "?action=verifySession" +

        "&username=" +
        encodeURIComponent(username) +

        "&token=" +
        encodeURIComponent(token),

        {
          cache: "no-store",
          keepalive: true
        }

      );

      const data =
        await res.json();

      // =====================================
      // SESSION INVALID
      // =====================================

      if (!data.success) {

        clearInterval(
          sessionMonitor
        );

        sessionMonitor = null;

        alert(
          "账号已在其他设备登录"
        );

        logout();

      }

    } catch (err) {

      console.log(
        "session verify failed",
        err
      );

    }

  }, 30000);

}

function resetIdleTimer() {

  clearTimeout(idleTimer);

  idleTimer = setTimeout(() => {

    alert("Session expired");

    logout();

  }, IDLE_LIMIT);

}

// =====================================
// SHOW APP
// =====================================

function showApp() {

  hideAll();

  document.getElementById("home")
    .style.display = "block";

}

// =====================================
// SHOW LOGIN PAGE
// =====================================

function showLoginPage() {

  hideAll();

  document.getElementById("loginPage")
    .style.display = "block";

  // reset UI state
  document.getElementById("loginError")
    .innerHTML = "";

  document.getElementById("username").value = "";
  document.getElementById("password").value = "";

}

// =====================================
// LOGIN LOADING
// =====================================

function showLoginLoading() {

  document.getElementById("loginError")
    .innerHTML =
    "⏳ Logging in...";

}

function formatTime(ts) {
  const d = new Date(ts);

  return d.toLocaleString("sv-SE", {
    timeZone: "Asia/Kuala_Lumpur",
    hour12: false
  }).replace(",", "");
}

// =====================================
// API CALL
// =====================================

function callAPI(id) {

  showLoading();

  const controller = new AbortController();

  const timeout = setTimeout(() => {

    controller.abort();

  }, 20000);

  fetch(

    API_URL + "?id=" +
    encodeURIComponent(id),

    {
      signal: controller.signal,
      cache: "no-store",
      keepalive: true
    }

  )

  .then(r => r.json())

  .then(data => {

    handleResult(data);

  })

  .catch(() => {

    handleResult({

      type: "error",

      message:
      "Network error / timeout"

    });

  })

  .finally(() => {

    clearTimeout(timeout);

  });

}

// =====================================
// OPEN SCAN
// =====================================

async function openScan() {

  currentMode = "scan";

  hideAll();

  document.getElementById("scanPage")
    .style.display = "block";

  // =====================================
  // CREATE SCANNER ONCE
  // =====================================

  if (!scanner) {

    scanner = new Html5Qrcode("scanner");

  }

  // =====================================
  // IF ALREADY STARTED
  // JUST RESUME
  // =====================================

  if (scannerStarted) {

    try {

      await scanner.resume();

      scanCooldown = false;

    } catch (err) {

      console.log(err);

    }

    return;

  }

  // =====================================
  // FIRST START
  // =====================================

  try {

    await scanner.start(

      {
        facingMode: "environment"
      },

      {
        fps: 15,
        qrbox: 250,
        aspectRatio: 1
      },

      onScanSuccess

    );

    scannerStarted = true;

    scanCooldown = false;

  } catch (err) {

    alert("Camera failed");

    console.log(err);

  }

}

// =====================================
// SCAN SUCCESS
// =====================================

async function onScanSuccess(text) {

  if (scanCooldown) return;

  scanCooldown = true;

  if (navigator.vibrate) {

    navigator.vibrate(80);

  }

  await scanner.pause(true);

  callAPI(text);

}

// =====================================
// MANUAL
// =====================================

function openManual() {

  currentMode = "manual";

  hideAll();

  document.getElementById("manualPage")
    .style.display = "block";

  const input =
    document.getElementById("idInput");

  input.value = "";

  input.focus();

}

function manualCheck() {

  const id =
    document.getElementById("idInput")
      .value
      .trim();

  if (!id) return;

  callAPI(id);

}

// =====================================
// HANDLE RESULT
// =====================================

function handleResult(data) {

  resetIdleTimer();
  
  hideAll();

  const page =
    document.getElementById("resultPage");

  page.style.display = "block";

  let html = "";

  // =====================================
  // SUCCESS
  // =====================================

  if (data.type === "success") {

    page.className = "success";

    html = `

      <div style="
      font-size:70px;
      color:green;
      font-weight:bold;
      ">
        ${data.chineseName}
      </div>

      <div style="
      font-size:40px;
      ">
        ${data.englishName}
      </div>

      <br>

      <div style="
      font-size:30px;
      ">
        Checked In
      </div>

      <div style="
      font-size:26px;
      ">
        ${formatTime(data.time)}
      </div>

    `;

    beep.currentTime = 0;

    beep.play();

    db.ref("count")
      .transaction(v => (v || 0) + 1);

  }

  // =====================================
  // DUPLICATE
  // =====================================

  else if (data.type === "duplicate") {

    page.className = "duplicate";

    html = `

      <div style="
      font-size:50px;
      color:orange;
      ">
        Already Checked In
      </div>

      <br>

      <div style="
      font-size:60px;
      ">
        ${data.chineseName}
      </div>

      <div style="
      font-size:40px;
      ">
        ${data.englishName}
      </div>

      <br>

      <div style="
      font-size:28px;
      ">
        Check-in Time
      </div>

      <div style="
      font-size:32px;
      ">
        ${formatTime(data.time)}
      </div>

    `;

  }

  // =====================================
  // ERROR
  // =====================================

  else {

    page.className = "error";

    html = `

      <div style="
      font-size:50px;
      color:red;
      ">
        ${data.message}
      </div>

    `;

  }

  document.getElementById("resultContent")
    .innerHTML = html;

}

// =====================================
// NEXT ACTION
// =====================================

async function nextAction() {

  if (currentMode === "scan") {

    hideAll();

    document.getElementById("scanPage")
      .style.display = "block";

    scanCooldown = false;

    if (scanner) {

      await scanner.resume();

    }

    return;

  }

  openManual();

}

// =====================================
// HOME
// =====================================

async function goHome() {

  hideAll();

  document.getElementById("home")
    .style.display = "block";

  scanCooldown = false;

  if (scanner && scannerStarted) {

    try {

      await scanner.pause(true);

    } catch(e){}

  }

}

// =====================================
// LOADING
// =====================================

function showLoading() {

  hideAll();

  const page =
    document.getElementById("resultPage");

  page.style.display = "block";

  page.className = "";

  document.getElementById("resultContent")
    .innerHTML = `

      <div style="
      font-size:40px;
      ">
        ⏳ Checking...
      </div>

    `;

}

// =====================================
// HIDE ALL
// =====================================

function hideAll() {

  document.getElementById("loginPage")
    .style.display = "none";

  document.getElementById("home")
    .style.display = "none";

  document.getElementById("scanPage")
    .style.display = "none";

  document.getElementById("manualPage")
    .style.display = "none";

  document.getElementById("dashboardPage")
    .style.display = "none";
  
  document.getElementById("resultPage")
    .style.display = "none";

  document.getElementById("searchPage")
    .style.display="none";

  document.getElementById("registerPage")
    .style.display="none";

  document.getElementById("searchResultPage")
    .style.display="none";

  document.getElementById("registerResultPage")
    .style.display="none";

}

// ============================
// DASHBOARD API
// ============================

function loadDashboard() {

  fetch(API_URL + "?action=dashboard", {
    cache: "no-store"
  })
  .then(r => r.json())
  .then(d => {

    document.getElementById("d_total").innerText = d.total || 0;
    document.getElementById("d_checked").innerText = d.checked || 0;
    document.getElementById("d_pending").innerText = d.pending || 0;
    document.getElementById("d_a").innerText = d.a || 0;
    document.getElementById("d_b").innerText = d.b || 0;

  })
  .catch(() => {});

}

function openDashboard() {

  hideAll();

  document.getElementById("dashboardPage")
    .style.display = "block";

  loadDashboard(); // 进来就刷新一次

}

function openSearch(){

hideAll();

document.getElementById("searchPage")
.style.display="block";

}

function openRegister(){

hideAll();

document.getElementById("registerPage")
.style.display="block";

}

document
.getElementById("searchInput")
.value
.trim();

document
.getElementById("searchInput")
.value="";

if(!keyword){

alert("Enter Name / Phone / Email / ID");

return;

}

hideAll();

document
.getElementById("searchResultPage")
.style.display="block";

document
.getElementById("searchResultContent")
.innerHTML=`

<div style="
font-size:34px;
">
⏳ Searching...
</div>

`;

try{

const url=

API_URL+

"?action=searchParticipant"+

"&keyword="+
encodeURIComponent(keyword);

const res=
await fetch(url,{
cache:"no-store"
});

const data=
await res.json();

// =====================================
// NOT FOUND
// =====================================

if(!data.success){

document
.getElementById("searchResultContent")
.innerHTML=`

<div style="
font-size:34px;
color:red;
font-weight:700;
">
Participant Not Found
</div>

`;

return;

}

// =====================================
// RESULT
// =====================================

document
.getElementById("searchResultContent")
.innerHTML=`

<div style="
font-size:34px;
font-weight:700;
">
${data.id}
</div>

<br>

<div style="
font-size:28px;
font-weight:700;
">
${data.chineseName}
</div>

<div style="
font-size:26px;
font-weight:700;
">
${data.englishName}
</div>

<br>

<img
src="${data.qr}"
width="280"
>

<br><br>

<a
href="${data.wa}"
target="_blank"

function shouldWarmup() {

  const last =
    Number(
      localStorage.getItem(WARMUP_KEY) || "0"
    );

  return (
    Date.now() - last >
    WARMUP_COOLDOWN
  );

}

function smartWarmup(type = "smart") {

  if (!shouldWarmup()) return;

  const url =

    API_URL +

    "?action=warmup" +

    "&type=" + encodeURIComponent(type);

  try {

    navigator.sendBeacon(url);

  } catch (err) {}

  localStorage.setItem(
    WARMUP_KEY,
    Date.now().toString()
  );

}
