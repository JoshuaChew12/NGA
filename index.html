<style>
/* =================================================== */
/* 全局基础重置：深海极光青 3D 晶体调色盘 */
/* =================================================== */
body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", Arial, sans-serif;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #030611; /* 极深邃的夜空蓝黑，反衬水晶泡泡 */
  color: #f8fafc;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* =================================================== */
/* ⚡ 核心进化 1：全屏超立体“3D 镜面折射大泡泡”背景层 */
/* =================================================== */
.bubble-bg-container {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: -1;
  overflow: hidden;
  background: radial-gradient(circle at 50% 0%, #081022 0%, #030611 100%);
}

/* 核心魔改：通过多层复杂渐变叠加，模拟 3D 球面的体积感与背部透光 */
.giant-bubble {
  position: absolute;
  border-radius: 50%;
  
  /* 3D 体积感核心：通过径向渐变模拟球体左上角受光、右下角透光（模拟真实水晶球物理光学） */
  background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.25) 0%, rgba(20, 184, 166, 0.4) 40%, rgba(2, 132, 199, 0.15) 70%, transparent 100%);
  
  /* 鲜明的圆形外轮廓线 */
  border: 1px solid rgba(20, 184, 166, 0.4);
  
  /* 镜面反射与二次折射：
     inset 8px 8px... -> 左上角强力射入的晶体聚光
     inset -12px -12px... -> 右下角球体边缘的阴影包裹 */
  box-shadow: 
    inset 8px 8px 18px rgba(255, 255, 255, 0.5), 
    inset -12px -12px 25px rgba(3, 7, 18, 0.6),
    0 15px 35px rgba(20, 184, 166, 0.12);
    
  filter: blur(0.5px); /* 几乎完全锐利，保障真实的物理镜面边界 */
  animation: floatBubble 14s ease-in-out infinite alternate;
}

/* ⚡ 关键细节：利用伪元素在泡泡表面强行切出一道“物理折射弯月高光” */
.giant-bubble::before {
  content: '';
  position: absolute;
  top: 6%; left: 8%;
  width: 45%; height: 25%;
  border-radius: 50%;
  /* 完美的表面反光片效果 */
  background: linear-gradient(to bottom, rgba(255, 255, 255, 0.65) 0%, transparent 100%);
  transform: rotate(-15deg);
}

/* 3个大小错落的 3D 反光晶体玻璃球 */
.b1 { width: 310px; height: 310px; top: -3%; left: -6%; animation-duration: 15s; }
.b2 { width: 250px; height: 250px; top: 42%; right: -10%; animation-duration: 19s; animation-delay: -3s; }
.b3 { width: 210px; height: 210px; bottom: -4%; left: 12%; animation-duration: 17s; }

@keyframes floatBubble {
  0% { transform: translate(0, 0) scale(1) rotate(0deg); }
  100% { transform: translate(20px, 30px) scale(1.08) rotate(5deg); }
}

/* =================================================== */
/* ⚡ 核心进化 2：Login 登录面板魔改（通透白、不全暗、极度舒服） */
/* =================================================== */
.loginBox {
  margin-top: 50px;
  /* 告别死暗！改用 75% 透明度的高档冰川牛奶白作为舱体基底 */
  background: rgba(255, 255, 255, 0.75); 
  padding: 40px 25px;
  border-radius: 26px; /* 饱满的 App 圆角 */
  
  /* 顶层高光切面线，拉开 3D 立体悬浮感 */
  border: 1px solid rgba(255, 255, 255, 0.9);
  border-bottom: 2px solid rgba(0, 0, 0, 0.04);
  
  /* 强烈的毛玻璃滤镜，让后方缓缓漂浮的 3D 大泡泡滑过时，产生极为高端的模糊透光折射 */
  backdrop-filter: blur(30px); 
  -webkit-backdrop-filter: blur(30px);
  
  /* 复合下沉投影，让 Login 舱体在深色背景上强烈悬浮 */
  box-shadow: 
    0 4px 10px rgba(0, 0, 0, 0.1),
    0 20px 50px rgba(0, 0, 0, 0.5),
    inset 0 1px 0 rgba(255, 255, 255, 0.8);
}

/* 配合明亮 Login 舱体，将内部的文字调校为高档石墨灰（清晰、不伤眼） */
.loginBox h3 {
  color: #0f172a !important;
  font-weight: 800;
  font-size: 22px !important;
  margin-bottom: 24px;
  letter-spacing: -0.5px;
}

/* 独立设计的白舱专属立体输入框 */
.loginBox input {
  background: #f8fafc !important; /* 温润的牛奶浅灰底 */
  border: 1px solid rgba(15, 23, 42, 0.08) !important;
  color: #0f172a !important; /* 钢石黑输入文字 */
  box-shadow: inset 0 2px 4px rgba(15, 23, 42, 0.04) !important;
}
.loginBox input:focus {
  border-color: #0d9488 !important;
  box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.15) !important;
  background: #ffffff !important;
}
.loginBox input::placeholder {
  color: #94a3b8 !important;
}

/* 白舱专属大按钮：选用极其扎实的极光深海蓝渐变 */
.loginBox button {
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important;
  color: #ffffff !important;
  box-shadow: 0 10px 24px rgba(15, 23, 42, 0.2) !important;
}

/* =================================================== */
/* ⚡ 核心组件 3：主页液态水滴晶体卡片（白晶极光厚度版） */
/* =================================================== */
.homeCard {
  height: 105px;
  padding: 12px 6px !important;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  box-sizing: border-box;
  background: #ffffff; /* 牛奶晶体纯白 */

  cursor: pointer;
  width: 100%;
  border: 1px solid rgba(255, 255, 255, 0.9);
  
  /* 5px 偏置的极光青实体阴影，死死压出实体的侧面厚度 */
  box-shadow: 
    0 5px 0px #0d9488, /* 极光青实体厚度层 */
    0 16px 32px rgba(0, 0, 0, 0.6), 
    inset 0 1.5px 0px #ffffff;
  transition: all 0.12s cubic-bezier(0.4, 0, 0.2, 1);
}
.homeCard:active {
  transform: translateY(5px) scale(0.96);
  background: #f0fdfa;
  box-shadow: 0 0px 0px transparent, 0 4px 10px rgba(0, 0, 0, 0.4), inset 0 1px 0px rgba(0,0,0,0.02);
}

/* 按钮、输入框（通用通用组件，适用于白舱之外的子页面） */
input {
  padding: 16px; font-size: 17px; width: 230px; background: #0f172a; border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 16px; color: #ffffff; text-align: center; outline: none;
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5), 0 4px 12px rgba(0, 0, 0, 0.3); transition: all 0.25s ease;
}
input:focus { border-color: #2dd4bf; box-shadow: 0 0 0 4px rgba(45, 212, 191, 0.15); background: #1e293b; }
input::placeholder { color: #475569; }

button {

  background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%); color: #ffffff;

  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); letter-spacing: 0.5px;
}

#home > div {
  grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 20px 14px !important;
  width: 100% !important; max-width: 100% !important; padding: 10px 4px !important; margin: 0 auto !important; box-sizing: border-box !important;
}

/* 分区色彩独立图标槽 */
.homeCard:nth-child(1) .homeIcon { background: #e0f2fe; color: #0369a1; } 
.homeCard:nth-child(2) .homeIcon { background: #fef3c7; color: #b45309; }

.homeCard:nth-child(6) .homeIcon { background: #fef2f2; color: #b91c1c; } 
.homeIcon { font-size: 20px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 14px; margin-bottom: 6px; line-height: 1; box-shadow: 0 2px 0px rgba(0, 0, 0, 0.03); }
.homeText { font-size: 14px; font-weight: 800; line-height: 1.2; color: #1e293b; letter-spacing: -0.1px; }

/* 状态反馈提示色 */
.success { background: rgba(20, 184, 166, 0.15) !important; border: 1px solid #14b8a6 !important; color: #2dd4bf !important; border-radius: 14px; }
.duplicate { background: rgba(245, 158, 11, 0.15) !important; border: 1px solid #f59e0b !important; color: #fbbf24 !important; border-radius: 14px; }
.error { background: rgba(239, 68, 68, 0.15) !important; border: 1px solid #ef4444 !important; color: #f87171 !important; border-radius: 14px; }

/* 应用主内容外层总容器 */
#appContainer { width: 100%; max-width: 520px; padding: 20px; box-sizing: border-box; position: relative; z-index: 1; }
#count, #d_total, #d_checked, #d_pending, #d_a, #d_b { color: #2dd4bf; font-weight: 800; font-size: 1.2em; text-shadow: 0 0 10px rgba(45, 212, 191, 0.3); }

/* 标题排版 */

</style>
  
</head>

<script>

// =====================================
// CONFIG
// =====================================

const API_URL =
"https://script.google.com/macros/s/AKfycbx0J4r_E2dRfHPV7TyJNf4-h-MJzSkfRB4f2aeFi1fRgO-Osw4ekVAADVAL4qWluI4h/exec";

// =====================================
// FIREBASE
// =====================================

firebase.initializeApp({

  databaseURL:
  "https://nga-worship-default-rtdb.asia-southeast1.firebasedatabase.app/"

});

const db = firebase.database();

// realtime counter

db.ref("count").on("value", snap => {

  document.getElementById("count")
    .innerText = snap.val() || 0;

});

// =====================================
// GLOBALS
// =====================================

let scanner = null;
let scannerStarted = false;
let currentMode = "";
let scanCooldown = false;
let idleTimer = null;

const DEFAULT_IDLE_LIMIT = 10 * 60 * 1000;
const WARMUP_KEY = "gas_warmup_last";
const WARMUP_COOLDOWN = 4 * 60 * 1000;

// =====================================
// PRELOAD BEEP
// =====================================

const beep = new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

beep.preload = "auto";

// =====================================
// APP START
// =====================================

window.addEventListener("load", () => {

  // initial warm
  smartWarmup("full");

  // keep warm
  setInterval(() => {

    smartWarmup("smart");

  }, 4 * 60 * 1000);
  
  ["click","touchstart","keypress"].forEach(event => {

  document.addEventListener(event, () => {

    if (
      sessionStorage.getItem("auth") === "true"
    ) {
      resetIdleTimer();
    }

  });

});
  
  // =====================================
  // LOGIN CHECK
  // =====================================

  const auth =
    sessionStorage.getItem("auth");

  if (auth === "true") {

    startSessionMonitor();

    showApp();

  } else {

    showLoginPage();

  }

});

// =====================================
// LOGIN
// =====================================

function login() {

  smartWarmup("login_fallback");
  
  const username =
    document.getElementById("username")
      .value
      .trim();

  const password =
    document.getElementById("password")
      .value
      .trim();

  // =====================================
  // EMPTY CHECK
  // =====================================

  if (!username || !password) {

    document.getElementById("loginError")
      .innerText =
      "Enter username and password";

    return;

  }

  // =====================================
  // LOADING
  // =====================================

  showLoginLoading();

  // =====================================
  // TIMEOUT PROTECTION
  // =====================================

  const controller =
    new AbortController();

  const timeout =
    setTimeout(() => {

      controller.abort();

    }, 20000);

  // =====================================
  // LOGIN REQUEST
  // =====================================

  fetch(

    API_URL +

    "?action=login" +

    "&username=" +
    encodeURIComponent(username) +

    "&password=" +
    encodeURIComponent(password),

    {

      signal: controller.signal,

      cache: "no-store",

      keepalive: true

    }

  )

  .then(r => r.json())

  .then(data => {

    // =====================================
    // SUCCESS
    // =====================================

    if (data.success) {

      sessionStorage.setItem(
        "auth",
        "true"
      );

      sessionStorage.setItem(
        "username",
        data.username
      );

      sessionStorage.setItem(
        "role",
        data.role
      );

      // =====================================
      // SAVE SESSION TOKEN
      // =====================================

      sessionStorage.setItem(
        "sessionToken",
        data.token
      );

      sessionStorage.setItem(
        "idleLimit",
        data.idleLimit
      );
      
      resetIdleTimer();

      // start session monitor
      startSessionMonitor();

      showApp();

      return;

    }

    // =====================================
    // INVALID LOGIN
    // =====================================

    document.getElementById("loginError")
      .innerText =
      "Invalid username or password";

    showLoginPage();

  })

  // =====================================
  // NETWORK ERROR / TIMEOUT
  // =====================================

  .catch(err => {

    // timeout
    if (err.name === "AbortError") {

      document.getElementById("loginError")
        .innerText =
        "Login timeout";

      showLoginPage();

      return;

    }

    // other network errors
    document.getElementById("loginError")
      .innerText =
      "Network error";

    showLoginPage();

  })

  // =====================================
  // CLEAR TIMER
  // =====================================

  .finally(() => {

    clearTimeout(timeout);

  });

}

// =====================================
// LOGOUT
// =====================================

function logout() {

  // stop monitor
  if (sessionMonitor) {

    clearInterval(
      sessionMonitor
    );

    sessionMonitor = null;

  }

  sessionStorage.clear();

  goHome();

  hideAll();

  showLoginPage();

}

let sessionMonitor = null;

function startSessionMonitor() {

  // avoid duplicate interval
  if (sessionMonitor) {
    return;
  }

  sessionMonitor = setInterval(async () => {

    try {

      const username =
        sessionStorage.getItem(
          "username"
        );

      const token =
        sessionStorage.getItem(
          "sessionToken"
        );

      // no session
      if (!username || !token) {
        return;
      }

      const res = await fetch(

        API_URL +

        "?action=verifySession" +

        "&username=" +
        encodeURIComponent(username) +

        "&token=" +
        encodeURIComponent(token),

        {
          cache: "no-store",
          keepalive: true
        }

      );

      const data =
        await res.json();

      // =====================================
      // SESSION INVALID
      // =====================================

      if (!data.success) {

        clearInterval(
          sessionMonitor
        );

        sessionMonitor = null;

        alert(
          "账号已在其他设备登录"
        );

        logout();

      }

    } catch (err) {

      console.log(
        "session verify failed",
        err
      );

    }

  }, 30000);

}

function resetIdleTimer(){

clearTimeout(idleTimer);

const idleLimit=

Number(
sessionStorage.getItem(
"idleLimit"
)
) ||

DEFAULT_IDLE_LIMIT;

idleTimer=setTimeout(()=>{

alert("Session expired");

logout();

},idleLimit);

function formatTime(ts) {
  const d = new Date(ts);

  return d.toLocaleString("sv-SE", {
    timeZone: "Asia/Kuala_Lumpur",
    hour12: false
  }).replace(",", "");
}

// =====================================
// API CALL
// =====================================

function callAPI(id) {

  showLoading();

  const controller = new AbortController();

  const timeout = setTimeout(() => {

    controller.abort();

  }, 20000);

  fetch(

    API_URL + "?id=" +
    encodeURIComponent(id),

    {
      signal: controller.signal,
      cache: "no-store",
      keepalive: true
    }

  )

  .then(r => r.json())

  .then(data => {

    handleResult(data);

  })

  .catch(() => {

    handleResult({

      type: "error",

      message:
      "Network error / timeout"

    });

  })

  .finally(() => {

    clearTimeout(timeout);

  });

}

// =====================================

async function openScan() {

  currentMode = "scan";

  hideAll();

  document.getElementById("scanPage")
    .style.display = "block";

  // =====================================
  // CREATE SCANNER ONCE
  // =====================================

  if (!scanner) {

    scanner = new Html5Qrcode("scanner");

  }

  // =====================================
  // IF ALREADY STARTED
  // JUST RESUME
  // =====================================

  if (scannerStarted) {

    try {

      await scanner.resume();

      scanCooldown = false;

    } catch (err) {

      console.log(err);

    }

    return;

  }

  // =====================================
  // FIRST START
  // =====================================

  try {

    await scanner.start(

      {
        facingMode: "environment"
      },

      {
        fps: 15,
        qrbox: 250,
        aspectRatio: 1
      },

      onScanSuccess

    );

    scannerStarted = true;

    scanCooldown = false;

  } catch (err) {

    alert("Camera failed");

    console.log(err);

  }

}

// =====================================
// SCAN SUCCESS
// =====================================

async function onScanSuccess(text) {

  if (scanCooldown) return;

  scanCooldown = true;

  if (navigator.vibrate) {

    navigator.vibrate(80);

  }

  await scanner.pause(true);

  callAPI(text);

}

// =====================================
// HANDLE RESULT
// =====================================

function handleResult(data) {

  resetIdleTimer();
  
  hideAll();

  const page =
    document.getElementById("resultPage");

  page.style.display = "block";

  let html = "";

  // =====================================
  // SUCCESS
  // =====================================

  if (data.type === "success") {

    page.className = "success";

    html = `

      <div style="
      font-size:70px;
      color:green;
      font-weight:bold;
      ">
        ${data.chineseName}
      </div>

      <div style="
      font-size:40px;
      ">
        ${data.englishName}
      </div>

      <br>

      <div style="
      font-size:30px;
      ">
        Checked In
      </div>

      <div style="
      font-size:26px;
      ">
        ${formatTime(data.time)}
      </div>

    `;

    beep.currentTime = 0;

    beep.play();

    db.ref("count")
      .transaction(v => (v || 0) + 1);

  }

  // =====================================
  // DUPLICATE
  // =====================================

  else if (data.type === "duplicate") {

    page.className = "duplicate";

    html = `

      <div style="
      font-size:50px;
      color:orange;
      ">
        Already Checked In
      </div>

      <br>

      <div style="
      font-size:60px;
      ">
        ${data.chineseName}
      </div>

      <div style="
      font-size:40px;
      ">
        ${data.englishName}
      </div>

      <br>

      <div style="
      font-size:28px;
      ">
        Check-in Time
      </div>

      <div style="
      font-size:32px;
      ">
        ${formatTime(data.time)}
      </div>

    `;

  }

  // =====================================
  // ERROR
  // =====================================

  else {

    page.className = "error";

    html = `

      <div style="
      font-size:50px;
      color:red;
      ">
        ${data.message}
      </div>

    `;

  }

  document.getElementById("resultContent")
    .innerHTML = html;

}

// ============================
// SMART WARMUP SYSTEM
// ============================

function shouldWarmup() {

  const last =
    Number(
      localStorage.getItem(WARMUP_KEY) || "0"
    );

  return (
    Date.now() - last >
    WARMUP_COOLDOWN
  );

}

function smartWarmup(type = "smart") {

  if (!shouldWarmup()) return;

  const url =

    API_URL +

    "?action=warmup" +

    "&type=" + encodeURIComponent(type);

  try {

    navigator.sendBeacon(url);

  } catch (err) {}

  localStorage.setItem(
    WARMUP_KEY,
    Date.now().toString()
  );

}
